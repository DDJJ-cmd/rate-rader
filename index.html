<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
<title>OTA URL Builder</title>

<style>
:root{
  --bg:#f7f8fa;
  --card:#ffffff;
  --border:#e5e7eb;
  --primary:#111111;
  --muted:#6b7280;
}

*{box-sizing:border-box;}

body{
  margin:0;
  background:var(--bg);
  font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",Roboto,"Noto Sans JP",sans-serif;
  padding:env(safe-area-inset-top) 16px env(safe-area-inset-bottom);
}

.container{
  max-width:500px;
  margin:0 auto;
}

h1{
  font-size:22px;
  margin:20px 0 8px;
}

.sub{
  font-size:13px;
  color:var(--muted);
  margin-bottom:20px;
}

.card{
  background:var(--card);
  border:1px solid var(--border);
  border-radius:18px;
  padding:16px;
  margin-bottom:16px;
}

label{
  display:block;
  font-size:12px;
  color:var(--muted);
  margin-bottom:6px;
  margin-top:14px;
}

input, select, textarea{
  width:100%;
  padding:14px;
  border-radius:14px;
  border:1px solid var(--border);
  font-size:16px;
  background:#fff;
}

textarea{
  min-height:200px;
  font-size:13px;
  font-family:ui-monospace,SFMono-Regular,Menlo,monospace;
}

button{
  width:100%;
  padding:16px;
  border-radius:16px;
  border:none;
  font-size:16px;
  margin-top:14px;
}

.primary{
  background:var(--primary);
  color:white;
}

.secondary{
  background:#eef2f7;
}

.small{
  font-size:12px;
  color:var(--muted);
  margin-top:10px;
}
</style>
</head>

<body>
<div class="container">

<h1>OTA URL Builder</h1>
<div class="sub">検索URLを量産して「取得の下地」を作る（後で自動化可能）</div>

<div class="card">

<label>OTA</label>
<select id="ota">
  <option value="booking">Booking.com</option>
</select>

<label>ホテル名（検索キーワード）</label>
<input id="hotel" placeholder="例：Hotel Metropolitan Tokyo">

<label>開始日（チェックイン）</label>
<input id="startDate" type="date">

<label>何日分URLを作る？</label>
<input id="days" type="number" value="14">

<label>泊数</label>
<input id="nights" type="number" value="1">

<label>人数</label>
<input id="adults" type="number" value="2">

<label>部屋数</label>
<input id="rooms" type="number" value="1">

<label>通貨</label>
<input id="currency" value="JPY">

<button class="primary" onclick="generate()">URLを生成</button>
<button class="secondary" onclick="copyOut()">コピー</button>

<div class="small">生成されたURLを順番に開いて価格を確認します。</div>

</div>

<div class="card">
<label>生成結果</label>
<textarea id="out" readonly></textarea>
</div>

</div>

<script>
function fmt(d){
  return {
    yyyy:d.getFullYear(),
    mm:String(d.getMonth()+1).padStart(2,'0'),
    dd:String(d.getDate()).padStart(2,'0')
  };
}

function addDays(date,n){
  const d=new Date(date);
  d.setDate(d.getDate()+n);
  return d;
}

function bookingUrl({query,checkin,checkout,adults,rooms,currency}){
  const q=encodeURIComponent(query);
  return `https://www.booking.com/searchresults.ja.html?ss=${q}&checkin_year=${checkin.yyyy}&checkin_month=${checkin.mm}&checkin_monthday=${checkin.dd}&checkout_year=${checkout.yyyy}&checkout_month=${checkout.mm}&checkout_monthday=${checkout.dd}&group_adults=${adults}&no_rooms=${rooms}&selected_currency=${currency}`;
}

function generate(){
  const hotel=document.getElementById('hotel').value;
  const start=document.getElementById('startDate').value;
  const days=Number(document.getElementById('days').value);
  const nights=Number(document.getElementById('nights').value);
  const adults=Number(document.getElementById('adults').value);
  const rooms=Number(document.getElementById('rooms').value);
  const currency=document.getElementById('currency').value;

  if(!hotel||!start){alert("ホテル名と開始日を入力してください");return;}

  const startDate=new Date(start);
  const lines=[];

  for(let i=0;i<days;i++){
    const ci=addDays(startDate,i);
    const co=addDays(ci,nights);
    const checkin=fmt(ci);
    const checkout=fmt(co);

    const url=bookingUrl({query:hotel,checkin,checkout,adults,rooms,currency});
    lines.push(`${checkin.yyyy}-${checkin.mm}-${checkin.dd}  ${url}`);
  }

  document.getElementById('out').value=lines.join("\n");
}

function copyOut(){
  const t=document.getElementById('out');
  t.select();
  document.execCommand('copy');
  alert("コピーしました");
}
</script>

</body>
</html>
